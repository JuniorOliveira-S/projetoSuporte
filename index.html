<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suporte TI - Abertura de Chamado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      
            
              <img src="img/img_Chamado.png" alt="Suporte TI" class="logo-img mb-2" />
              <h1 class="h3">Suporte TI</h1>
              <p class="text-muted mb-0">Preencha o formulário para abrir um chamado, o Departamento de TI entrara em contato logo em seguida!</p>
            </div>

            <form id="form-suporte">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">👤 Nome</label>
                  <input type="text" id="campo-nome" class="form-control" placeholder="Ex: João Silva" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">📧 E-mail</label>
                  <input type="email" id="campo-email" class="form-control" placeholder="Ex: joao@email.com" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">📱 Telefone</label>
                  <input type="tel" id="campo-telefone" class="form-control" placeholder="Ex: (43) 99999-9999" />
                </div>

                <div class="col-md-6">
                  <label class="form-label">🏢 Departamento</label>
                  <select id="campo-departamento" class="form-select" required>
                    <option value="">Selecione</option>
                    <option>Administrativo</option>
                    <option>Financeiro</option>
                    <option>Qualidade</option>
                    <option>Fiscal</option>
                    <option>Contabilidade</option>
                    <option>Faturamento</option>
                    <option>Exportação</option>
                    <option>Diretoria</option>
                    <option>RH</option>
                    <option>Compras</option>
                    <option>Almoxarifado</option>
                    <option>Manutenção</option>
                    <option>Outros</option>
                  </select>
                </div>

                <div class="col-12">
                  <label class="form-label">🛠️ Tipo de chamado</label>
                  <select id="campo-tipo" class="form-select" required>
                    <option value="">Selecione</option>
                    <option>Problema com impressão</option>
                    <option>Problema com Sistema ERP (Atak Sistemas)</option>
                    <option>Problema com Acesso Internet</option>
                    <option>Problema com computador</option>
                    <option>Problema com telefonia</option>
                    <option>Problema com controle de acesso</option>
                    <option>Permissões de acesso (Servidor)</option>
                    <option>Outros</option>
                  </select>
                </div>

                <div class="col-12">
                  <label class="form-label">📝 Descreva o problema</label>
                  <textarea id="campo-problema" class="form-control" rows="5" placeholder="Descreva o problema com o máximo de detalhes possível..." required></textarea>
                </div>

                <div class="col-12">
                  <label class="form-label">💬 Observações adicionais</label>
                  <textarea id="campo-observacoes" class="form-control" rows="3" placeholder="Informações extras, horário, máquina, setor, etc."></textarea>
                </div>
              </div>

              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-success">
                  Abrir chamado
                </button>
              </div>

              <div id="mensagem-erro" class=" alert-danger"></div>
              <div id="mensagem-sucesso" class="alert-success"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
